{% extends 'base.html' %}
{% block title %}Log in — TicketFlow{% endblock %}

{% block content %}
<div class="page-wrap page-narrow">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🎟️</div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in to your TicketFlow account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn-primary btn-block">Log in</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a></p>

    <div class="demo-hint">
      <strong>Demo admin:</strong> admin@ticketflow.com / admin123
    </div>
  </div>
</div>
{% endblock %}
