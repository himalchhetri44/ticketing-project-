{% extends 'base.html' %}
{% block title %}Sign up — TicketFlow{% endblock %}

{% block content %}
<div class="page-wrap page-narrow">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🎟️</div>
      <h1 class="auth-title">Create an account</h1>
      <p class="auth-sub">Join TicketFlow and start booking</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Repeat your password" required>
      </div>
      <button type="submit" class="btn-primary btn-block">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
